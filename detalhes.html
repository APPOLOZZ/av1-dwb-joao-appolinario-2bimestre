<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhes — D&D 5e Compêndio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/detalhes.css"/>
</head>
<body>

  <header class="site-header text-center py-4">
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1 class="site-title" style="font-size:clamp(1.5rem,4vw,2.5rem)">Compêndio de D&D 5e</h1>
    <div class="header-ornament">✦ ✦ ✦</div>
  </header>

  <div class="container my-4">
    <!-- Botão voltar -->
    <a href="index.html" class="btn-voltar">← Voltar ao Compêndio</a>
  </div>

  <main class="container mb-5" id="main-content">

    <!-- Loading -->
    <div id="loading" class="text-center my-5">
      <div class="scroll-loader">
        <div class="scroll-spinner"></div>
        <p class="mt-3 loading-text">Consultando os pergaminhos antigos...</p>
      </div>
    </div>

    <!-- Erro -->
    <div id="error" class="alert-scroll d-none text-center my-4">
      ⚠️ Não foi possível carregar os detalhes deste item.
    </div>

    <!-- Conteúdo de detalhes (preenchido pelo JS) -->
    <div id="detalhe-container" class="d-none"></div>

  </main>

  <footer class="site-footer text-center py-4">
    <div class="footer-ornament">⸻ ✦ ⸻</div>
    <p class="mb-0">Dados fornecidos por <a href="https://www.dnd5eapi.co" target="_blank">dnd5eapi.co</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/detalhes.js"></script>
</body>
</html>
