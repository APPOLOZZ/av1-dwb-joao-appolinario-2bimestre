<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D&D 5e — Compêndio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <header class="site-header text-center py-5">
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1 class="site-title">Compêndio de D&D 5e</h1>
    <p class="site-subtitle">Bestiário · Grimório · Ordens · Arsenal</p>
    <div class="header-ornament">✦ ✦ ✦</div>
  </header>

  <nav class="tab-nav container-fluid px-0">
    <div class="tab-nav-inner d-flex justify-content-center flex-wrap">
      <button class="tab-btn active" data-category="monsters">
        <span class="tab-icon">🐉</span> Monstros
      </button>
      <button class="tab-btn" data-category="spells">
        <span class="tab-icon">✨</span> Magias
      </button>
      <button class="tab-btn" data-category="classes">
        <span class="tab-icon">⚔️</span> Classes
      </button>
      <button class="tab-btn" data-category="equipment">
        <span class="tab-icon">🛡️</span> Equipamentos
      </button>
    </div>
  </nav>

  <main class="container my-5">

    <div id="loading" class="text-center my-5 d-none">
      <div class="scroll-loader">
        <div class="scroll-spinner"></div>
        <p class="mt-3 loading-text">Consultando os pergaminhos antigos...</p>
      </div>
    </div>

    <div id="error" class="alert-scroll d-none text-center my-4">
      ⚠️ Os pergaminhos não puderam ser lidos. Tente novamente mais tarde.
    </div>

    <div class="section-header text-center mb-4">
      <h2 id="section-title" class="section-title">Bestiário</h2>
      <div class="section-divider">⸻ ✦ ⸻</div>
      <p id="section-count" class="section-count"></p>
    </div>

    <div id="card-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>

  </main>

  <footer class="site-footer text-center py-4">
    <div class="footer-ornament">⸻ ✦ ⸻</div>
    <p class="mb-0">Dados fornecidos por <a href="https://www.dnd5eapi.co" target="_blank">dnd5eapi.co</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
